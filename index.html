<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>태응의 실험실</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Application JS -->
  <script type="module" src="app.js"></script>
</head>

<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <i class="fa-solid fa-flask logo-icon"></i>
        <h1>마음의 소리함</h1>
      </div>
      <div class="header-right" style="display: flex; gap: 0.5rem;">
        <button id="debug-toggle" class="icon-btn" aria-label="디버그 로그 토글">
          <i class="fa-solid fa-bug"></i>
        </button>
        <button id="theme-toggle" class="icon-btn" aria-label="테마 전환">
          <i class="fa-solid fa-sun theme-sun-icon"></i>
          <i class="fa-solid fa-moon theme-moon-icon"></i>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
      <!-- Notice Banner -->
      <section class="app-notice">
        <i class="fa-solid fa-bullhorn notice-icon"></i>
        <span class="notice-text">진실인지 거짓말인지는 아무도 모릅니다.</span>
      </section>

      <!-- Comment Stats -->
      <section class="comment-stats">
        <span class="stats-text">전체 댓글 <strong id="comment-count">0</strong>개</span>
      </section>

      <!-- Comment Write Form -->
      <section class="comment-write-card">
        <form id="comment-form" class="comment-form">
          <div class="input-group">
            <label for="comment-author"><i class="fa-solid fa-user"></i> 닉네임</label>
            <input type="text" id="comment-author" placeholder="닉네임 입력" required maxlength="15">
          </div>
          <div class="textarea-group">
            <textarea id="comment-content" placeholder="오늘의 마음의 소리는 무엇인가요?" required maxlength="500"></textarea>
            <div class="char-counter"><span id="char-count">0</span> / 500</div>
          </div>
          <div class="form-actions">
            <button type="submit" class="submit-btn">
              <span>댓글 등록</span>
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </div>
        </form>
      </section>

      <!-- Comment List -->
      <section class="comment-list-section">
        <div id="comment-list" class="comment-list">
          <!-- Empty State -->
          <div class="empty-state" id="empty-state">
            <i class="fa-regular fa-comment-dots"></i>
            <p>아직 등록된 댓글이 없습니다.</p>
            <p class="subtitle">첫 번째 댓글의 주인공이 되어보세요!</p>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>&copy; 2026 Live Comment Feed. All rights reserved.</p>
    </footer>
  </div>

  <div id="debug-panel"
    style="position: fixed; bottom: 16px; right: 16px; width: 360px; height: 220px; background: #18181b; border: 1px solid #3f3f46; border-radius: 8px; z-index: 9999; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); font-family: system-ui, -apple-system, sans-serif;">
    <div
      style="background: #27272a; padding: 8px 12px; font-size: 0.8rem; font-weight: bold; border-bottom: 1px solid #3f3f46; display: flex; justify-content: space-between; align-items: center; color: #f4f4f5;">
      <span>🛠️ 시스템 디버그 로그</span>
      <button onclick="document.getElementById('debug-console').innerHTML=''"
        style="background: none; border: none; color: #a1a1aa; cursor: pointer; font-size: 0.75rem; hover: { color: #f4f4f5 };">Clear</button>
    </div>
    <div id="debug-console"
      style="flex: 1; padding: 10px; overflow-y: auto; color: #e4e4e7; font-size: 0.75rem; line-height: 1.4; text-align: left;">
    </div>
  </div>
</body>

</html>
