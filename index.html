<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한줄 댓글 피드</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Application JS -->
  <script src="app.js" defer></script>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <i class="fa-solid fa-comments logo-icon"></i>
        <h1>실시간 댓글 피드</h1>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="icon-btn" aria-label="테마 전환">
          <i class="fa-solid fa-sun theme-sun-icon"></i>
          <i class="fa-solid fa-moon theme-moon-icon"></i>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
      <!-- Comment Stats -->
      <section class="comment-stats">
        <span class="stats-text">전체 댓글 <strong id="comment-count">0</strong>개</span>
      </section>

      <!-- Comment Write Form -->
      <section class="comment-write-card">
        <form id="comment-form" class="comment-form">
          <div class="input-group">
            <label for="comment-author"><i class="fa-solid fa-user"></i> 닉네임</label>
            <input type="text" id="comment-author" placeholder="닉네임 입력" required maxlength="15">
          </div>
          <div class="textarea-group">
            <textarea id="comment-content" placeholder="이곳에 따뜻한 댓글을 남겨주세요..." required maxlength="500"></textarea>
            <div class="char-counter"><span id="char-count">0</span> / 500</div>
          </div>
          <div class="form-actions">
            <button type="submit" class="submit-btn">
              <span>댓글 등록</span>
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </div>
        </form>
      </section>

      <!-- Comment List -->
      <section class="comment-list-section">
        <div id="comment-list" class="comment-list">
          <!-- Empty State -->
          <div class="empty-state" id="empty-state">
            <i class="fa-regular fa-comment-dots"></i>
            <p>아직 등록된 댓글이 없습니다.</p>
            <p class="subtitle">첫 번째 댓글의 주인공이 되어보세요!</p>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>&copy; 2026 Live Comment Feed. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
